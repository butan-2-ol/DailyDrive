<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyDrive | Login</title>

    <style>

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 1.5rem;
            font-family: 'Segoe UI', Arial, sans-serif;
            perspective: 1000px;
            background: linear-gradient(256deg, rgb(246, 244, 244), #faf5f5);
        }
        .card {
           /* border: .02px solid #233;*/
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: #eee;
            border-radius: .6rem;
            gap: .8rem;
            width: 100%;
            max-width: 350px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.15);
            margin: 2rem;
            transition: transform 0.1s ease;
            
        }

        .heading {
            display: flex;
            align-items: center;
            gap: .5rem;
            font-family: 'segoe ui';

        }

        .heading img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
        }

        button {
            border: none; 
            background: #0a66c2;
            padding: .8rem;
            padding-right: 2rem;
            padding-left: 2rem;
            width: 100%;
            border-radius: .6rem;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 1.5rem;
            transition: all .2s ease;
            cursor: pointer;
            color: white;
        }

        button:hover {
            background: #084f8d;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0px 6px 14px rgba(0,0,0,0.2);
        }

        input {
            border-radius: .8rem;
            height: 1.5rem;
            min-width: 100%;
            border: none;
            padding: .2rem;
        }

        input:focus {
            outline: none;
            border: 2px solid #084f8d;
            background: #fff;
        }

        label {
            font-weight: bold;
            font-size: 1.1rem;
            font-family: arial, 'segoe ui', calibri, poppins;
            padding: .3rem;
        }
        p {
            text-align: center;
            font-size:1.1rem;
            font-family: 'segoe ui';
        }


        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
            100% { transform: translateX(0); }
        }

        .shake {
            animation: shake 0.4s;
        }
    </style>
</head>

<body>
    <div class="card" id="card">
        <div class="heading">
            <img src="images/logo.png" alt="logo">
            <h1>DailyDrive Login</h1>
        </div>

        <div>
            <form id="login-form">
                <label>Username
                    <input type="text" name="username" required>
                </label>
                <br>
                <br>
                <label>Password
                    <input type="password" name="password" required>
                </label>

        
            <button type="submit">Login</button>
       
            </form>
            <p id="message"></p>
        </div>

        
    </div>

    <p>Forgot your password, click <a href="#">here</a></p>

    <script>
        const card = document.getElementById("card");

        const form = document.getElementById("login-form");
        const message = document.getElementById("message");

        form.addEventListener("submit", function(event){
            event.preventDefault();

            const username = form.username.value;
            const password = form.password.value;

        // simple login check
        if(username === "admin" && password === "1234"){

            localStorage.setItem("user", username);

            message.textContent = "Login successful!";
            message.style.color = "green";

            // redirect after 1 second
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);

        } else {

            message.textContent = "Invalid username or password.";
            message.style.color = "red";

            card.classList.add("shake");
                setTimeout(()=> {
                    card,clssList.remove("shake");
                }, 400);
            
           // form.password.value = "";
        }

    });

    
            
        </script>


   
</body>
</html>
