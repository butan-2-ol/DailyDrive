<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyDrive | Register</title>
   
    <style>
                * {
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
            justify-content: center;
            padding: 2rem .5rem;
        }

        form {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background: #eeff;
            border-radius: .5rem;
            width: 100%;
            max-width: 450px;
        }

        .div {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            
            border-radius: .5rem;
            margin-bottom: 1rem;
        }

        .step {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
        }

        .step.active {
            display: flex;
        }
        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
        }


        h2 {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        label {
            font-size: large;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-family: Georgia, 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            gap: .3rem;
        }

        input {
            width: 100%;
            border-radius: .5rem;
            height: 2.3rem;
            border: 1px solid #ccc;
            padding: .8rem .8rem;
        }

        .container button {
            width: 100%;
            border: none;
            padding: .9rem .7rem;
            background:  #d6d4fb;
            border-radius: .8rem;
            font-size: 1rem;
            transition: all .3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            transform: translateY(-3px);
        }

        textarea {
            border-radius: .7rem;
            padding: .7rem;
            border: 1px solid #ccc;
            width: 100%;
    }

    .success-message {
        display: none;
        text-align: center;
        padding: 1.2rem;
    }

    .success-message h2 {
        color: green;
    }

.success-message button {
    margin-top: 3rem;
   
}

    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to DailyDrive</h1>

        <form id="registerform">
            <div class="step active">
                <h2>Personal Info</h2>
                <p>Step 1 of 3</p>
                <label>First Name
                    <input type="text" name="f-name" required>
                </label>

                <label>Last Name
                    <input type="text" name="l-name" required>
                </label>

                <label>Username
                    <input type="text" name="u-name" required>
                </label>
                <button type="button" class="next">Next</button>
            </div>

            <div class="step">
                <h2>Create Your Account</h2>
                <p>Step 2 of 3</p>
                <label>Email
                    <input type="email" name="email" required>
                </label>

                <label>Password
                    <input type="password" name="password" required>
                </label>

                <label>Confirm Password
                    <input type="password" name="c-password" required>
                </label>

                <button type="button" class="back">Back</button>
                <button type="button" class="next">Next</button>
            </div>


            <div class="step">
                <h2>Set Your First Goal</h2>
                <p>Step 3 of 3</p>
                <label>Goal Title
                    <input type="text" name="goal-title" required>
                </label>

                <label>Goal Description
                    <textarea rows="4" cols="20"></textarea>
                </label>

                <label  class="checkbox">Goal Duration
                    <select>
                        <option>7 Days</option>
                        <option>14 Days</option>
                        <option>30 Days</option>
                   </select>
                </label>

                 <button type="button" class="back">Back</button>
                 <button type="submit">Finish</button>
            </div>

           
        </form>
        <div class="success-message">
            <h2>🎉Account Created Successfully!</h2>
            <p>Your account has been registered</p>
            <!--<p>Welcome to DailyDrive!</p>-->
            <button onclick="goToLogin()">Go to Login</button>
        </div>
    </div>


    <script>
        const steps = document.querySelectorAll(".step");
        const nextBtns = document.querySelectorAll(".next");
        const backBtns = document.querySelectorAll(".back");

        let currentStep = 0;

        function showStep(step){
            steps.forEach((s, index)=>{
                s.classList.remove("active");
                if(index === step){
                    s.classList.add("active");
                }
            });
        }

        nextBtns.forEach(btn=>{
            btn.addEventListener("click", ()=>{
                if(currentStep < steps.length - 1){
                    currentStep++;
                    showStep(currentStep);
                }
            });
        });

        backBtns.forEach(btn=>{
            btn.addEventListener("click", ()=>{
                if(currentStep > 0){
                    currentStep--;
                    showStep(currentStep);
                }
            });
        });

        const form = document.querySelector("form");
        const successMessage = document.querySelector(".success-message");

        form.addEventListener("submit", function(e){
            e.preventDefault(); // stop page refresh

            form.style.display = "none";
            successMessage.style.display = "block";
        });

        function goToLogin() {
         //   window.location.href = "index.html";

            setTimeout( () => {
            window.location.href = "index.html";
        }, 3000);
        }

        
</script>

</body>
</html>
